[tool.black]
line-length = 88

[tool.isort]
profile = "black"
line_length = 88

# known_third_party = ["numpy", "pandas", "requests"]

[tool.ruff]
line-length = 88
select = ["E","F","I","UP","B"]  # style, bugbear, upgrade…

[tool.mypy]
python_version = "3.11"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q --strict-markers"

[tool.coverage.run]
branch = true
source = ["app"]
omit = ["app/frontend/*"]

[tool.coverage.report]
fail_under = 0
show_missing = true
skip_covered = false
